kind = "web"
previewPath = "/"
title = "BugLens — Defect Quality Checker"
version = "1.0.0"
id = "artifacts/buglens"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 3000

[services.development]
run = "pnpm --filter @workspace/buglens run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/buglens", "run", "build" ]
publicDir = "artifacts/buglens/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "3000"
BASE_PATH = "/"
